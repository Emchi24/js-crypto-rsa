<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSA Benchmark Results</title>
  <meta name="description" content="Benchmarking results for RSA cryptography project" />
  <meta name="keywords" content="Cryptography, RSA, Benchmarking" />
  <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
  <script src="./plotingScript.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #080c10;
      --panel:   #0d1318;
      --border:  #1e2d3a;
      --accent1: #00e5ff;
      --accent2: #ff4d6d;
      --accent3: #b2ff59;
      --text:    #c8dce8;
      --muted:   #4a6478;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

   body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 52px 48px 0;
    }

    .eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--accent1);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .eyebrow::before {
      content: '';
      display: inline-block;
      width: 28px; height: 1px;
      background: var(--accent1);
      box-shadow: 0 0 8px var(--accent1);
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(40px, 6vw, 72px);
      line-height: 0.95;
      text-transform: uppercase;
      color: #fff;
    }
    h1 span {
      display: block;
      color: var(--accent1);
      text-shadow: 0 0 40px var(--accent1), 0 0 80px rgba(0,229,255,0.3);
    }

    .divider {
      position: relative;
      z-index: 10;
      margin: 36px 48px 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), transparent);
      box-shadow: 0 0 12px rgba(0,229,255,0.25);
    }

    main {
      position: relative;
      z-index: 10;
      padding: 36px 48px 80px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .group-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .group-label .dot {
      width: 6px; height: 6px; border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-c { background: var(--accent1); box-shadow: 0 0 8px var(--accent1); }
    .dot-r { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
    .dot-g { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }

    .pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 860px) {
      .pair { grid-template-columns: 1fr; }
      header, main { padding-left: 20px; padding-right: 20px; }
      .divider { margin-left: 20px; margin-right: 20px; }
    }

    .chart-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      transition: border-color 0.25s, box-shadow 0.25s;
      animation: cardIn 0.45s ease both;
    }
    .chart-card:hover {
      border-color: var(--accent1);
      box-shadow: 0 0 28px rgba(0,229,255,0.07), 0 8px 36px rgba(0,0,0,0.35);
    }
    .chart-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 40px; height: 40px;
      background: linear-gradient(135deg, transparent 50%, rgba(0,229,255,0.05) 50%);
      pointer-events: none;
      z-index: 1;
    }
    .chart-card:nth-child(2) { animation-delay: 0.07s; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #keyGenSpeedTest, #keyGenMemoryTest,
    #encryptionSpeedTest, #encryptionMemoryTest,
    #decryptionSpeedTest, #decryptionMemoryTest {
      width: 100%;
      height: 600px;
    }

    footer {
      position: relative;
      z-index: 10;
      border-top: 1px solid var(--border);
      padding: 18px 48px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    footer span { color: var(--accent1); }
  </style>
</head>
<body>

<header>
  <h1>Benchmark<span>Results</span></h1>
</header>

<div class="divider"></div>

<main>

  <div class="group-label"><span class="dot dot-c"></span>Key Generation</div>
  <div class="pair">
    <div class="chart-card"><div id="keyGenSpeedTest"></div></div>
    <div class="chart-card"><div id="keyGenMemoryTest"></div></div>
  </div>

  <div class="group-label"><span class="dot dot-r"></span>Encryption</div>
  <div class="pair">
    <div class="chart-card"><div id="encryptionSpeedTest"></div></div>
    <div class="chart-card"><div id="encryptionMemoryTest"></div></div>
  </div>

  <div class="group-label"><span class="dot dot-g"></span>Decryption</div>
  <div class="pair">
    <div class="chart-card"><div id="decryptionSpeedTest"></div></div>
    <div class="chart-card"><div id="decryptionMemoryTest"></div></div>
  </div>

</main>


</body>
</html>
